version: "3.9"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: oneapp
      POSTGRES_PASSWORD: oneapp
      POSTGRES_DB: oneapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.4
    ports:
      - "7700:7700"
    environment:
      MEILI_NO_ANALYTICS: "true"

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
